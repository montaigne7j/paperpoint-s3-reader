name: Build Web Installer

on:
  push:
    branches: [master]
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: false

      - name: Install build tools
        run: |
          uv pip install --system -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip
          uv pip install --system -U esptool

      - name: Build CrossPoint release firmware
        run: pio run -e gh_release

      - name: Merge firmware for browser flashing
        run: |
          python scripts/merge_firmware.py \
            --env gh_release \
            --output docs/install/merged-firmware.bin

      - name: Stamp web installer manifest
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("docs/install/manifest.json")
          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          manifest["version"] = os.environ.get("GITHUB_REF_NAME", "latest")
          manifest_path.write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload merged firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosspoint-paper-s3-web-installer
          path: |
            docs/install/index.html
            docs/install/manifest.json
            docs/install/merged-firmware.bin
          if-no-files-found: error

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
